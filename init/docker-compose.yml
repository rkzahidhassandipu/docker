version: '3.9'

services:
  app1:
    build: ./app
    environment:
      - INSTANCE_NAME=App-1
  app2:
    build: ./app
    environment:
      - INSTANCE_NAME=App-2
  app3:
    build: ./app
    environment:
      - INSTANCE_NAME=App-3
  nginx:  
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
      - app3
